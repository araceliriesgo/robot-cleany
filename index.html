<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Robot Cleany</title>

<link
    rel="stylesheet"
    href="styles.css">

</head>

<body>
<!-- SCREENSAVER -->

<div id="screensaver">

    <div class="face">

        <div class="eyes">

            <div class="eye">
                <div class="pupil"></div>
            </div>

            <div class="eye">
                <div class="pupil"></div>
            </div>

        </div>

        <div class="mouth"></div>

        <div class="tap-message">
            Tocá la pantalla para comenzar
        </div>

    </div>

</div>

<!-- FORMULARIO -->

<div
    id="app"
    class="hidden">

    <div class="form-container">

        <h1>
            Escribí o dictá tu email para iniciar
        </h1>

        <input
            id="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="nombre@email.com">

        <div class="voice-hint">
            🎤 También podés usar el micrófono del teclado
        </div>

        <button
            id="continueButton"
            disabled>

            CONTINUAR

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
